    <script>
        // Анимированные частицы на фоне
        const canvas = document.getElementById('pioneer-bg');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 5;

        const points = new THREE.Points(
            new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(Array.from({length:2000}, () => (Math.random()-0.5)*10)), 3)),
            new THREE.PointsMaterial({ color: 0xD4AF37, size: 0.015, transparent: true, opacity: 0.25 })
        );
        scene.add(points);

        function animate() {
            points.rotation.y += 0.0006;
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
